name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable app
        run: npm run package:win

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $lines = Get-ChildItem -LiteralPath release -Filter "*.exe" |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          if ($lines.Count -lt 2) {
            throw "Expected both the NSIS installer and portable executable."
          }
          $lines | Set-Content -LiteralPath release/SHA256SUMS.txt -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexPet-Windows
          path: |
            release/*.exe
            release/*.blockmap
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $assets = @(
            Get-ChildItem -LiteralPath release -File |
              Where-Object {
                $_.Extension -in ".exe", ".blockmap" -or $_.Name -eq "SHA256SUMS.txt"
              } |
              Sort-Object Name |
              ForEach-Object { $_.FullName }
          )
          if ($assets.Count -lt 3) {
            throw "Release assets are incomplete."
          }
          gh release create "$env:GITHUB_REF_NAME" @assets `
            --title "Miao $env:GITHUB_REF_NAME" `
            --generate-notes `
            --verify-tag
